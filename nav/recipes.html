<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalNess Recipes</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */

nav{
height:80px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 8%;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#22c55e;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:50vh;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(40%);
}

.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

.hero-content h1{
font-size:60px;
margin-bottom:20px;
}

.search-box{
max-width:600px;
margin:auto;
display:flex;
background:white;
border-radius:50px;
overflow:hidden;
}

.search-box input{
flex:1;
padding:15px;
border:none;
outline:none;
font-size:16px;
}

.search-box button{
padding:15px 25px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
}

.explore-btn{
margin-top:20px;
display:inline-block;
padding:12px 30px;
background:#22c55e;
border-radius:30px;
text-decoration:none;
color:white;
}

/* FILTER */

.filters{
display:flex;
justify-content:center;
gap:15px;
padding:40px;
flex-wrap:wrap;
}

.filter-btn{
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
background:#1e293b;
color:white;
transition:.3s;
}

.filter-btn:hover{
background:#22c55e;
}

/* RECIPES */

.recipe-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:30px 8%;
}

.recipe-card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.4s;
}

.recipe-card:hover{
transform:translateY(-10px);
}

.recipe-card img{
width:100%;
height:220px;
object-fit:cover;
}

.recipe-content{
padding:20px;
}

.recipe-content h3{
margin-bottom:10px;
}

.tag{
display:inline-block;
padding:5px 12px;
border-radius:20px;
background:#22c55e;
font-size:12px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(8px);
}

.popup-box{
background:#1e293b;
width:90%;
max-width:700px;
border-radius:20px;
padding:30px;
animation:popup .5s;
}

@keyframes popup{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}

.popup h2{
margin-bottom:15px;
}

.popup ul{
padding-left:20px;
margin-top:10px;
}

.popup p{
line-height:1.8;
}

/* FOOTER */

footer{
background:#111827;
padding:40px;
margin-top:50px;
text-align:center;
}

</style>
</head>
<body>

<!-- NAVBAR -->

<nav>
<div class="logo">VitalNess</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Recipes</a></li>
<li><a href="#">Workout</a></li>
<li><a href="#">Blog</a></li>
</ul>
</nav>

<!-- HERO -->

<section class="hero">

<img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061">

<div class="hero-content">

<h1>Healthy Recipes</h1>

<div class="search-box">
<input type="text" id="searchInput"
placeholder="Search Recipe...">
<button>
<i class="fa fa-search"></i>
</button>
</div>

<a href="#recipes" class="explore-btn">
Explore Recipes
</a>

</div>
</section>

<!-- FILTERS -->

<div class="filters">

<button class="filter-btn" onclick="filterRecipes('all')">
All
</button>

<button class="filter-btn" onclick="filterRecipes('veg')">
Veg
</button>

<button class="filter-btn" onclick="filterRecipes('nonveg')">
Non Veg
</button>

<button class="filter-btn" onclick="filterRecipes('quick')">
Quick Meals
</button>

</div>

<!-- RECIPES -->

<div class="recipe-grid" id="recipes">

<!-- VEG -->

<div class="recipe-card veg"
onclick="openRecipe('Paneer Bowl','25 Min','28g Protein','Paneer, Rice, Vegetables','Cook rice. Grill paneer. Mix vegetables and serve.')">

<img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8">

<div class="recipe-content">
<span class="tag">Veg</span>
<h3>Paneer Protein Bowl</h3>
</div>

</div>

<!-- NON VEG -->

<div class="recipe-card nonveg"
onclick="openRecipe('Chicken Rice','30 Min','42g Protein','Chicken, Rice, Vegetables','Cook chicken and rice separately then combine.')">

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

<div class="recipe-content">
<span class="tag">Non Veg</span>
<h3>Chicken Rice Meal</h3>
</div>

</div>

<!-- QUICK -->

<div class="recipe-card quick"
onclick="openRecipe('Oats Shake','5 Min','18g Protein','Milk, Oats, Banana','Blend everything and serve.')">

<img src="https://images.unsplash.com/photo-1511690743698-d9d85f2fbf38">

<div class="recipe-content">
<span class="tag">Quick</span>
<h3>Protein Oats Shake</h3>
</div>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<span class="close" onclick="closePopup()">
✖
</span>

<h2 id="title"></h2>

<p><b>Time:</b> <span id="time"></span></p>

<p><b>Protein:</b> <span id="protein"></span></p>

<h3>Ingredients</h3>

<p id="ingredients"></p>

<h3>How To Make</h3>

<p id="steps"></p>

</div>

</div>

<!-- FOOTER -->

<footer>

<h2>VitalNess Recipes</h2>

<p>
Healthy Eating • Better Living • Stronger Body
</p>

</footer>

<script>

function filterRecipes(type){

let cards =
document.querySelectorAll(".recipe-card");

cards.forEach(card=>{

if(type==="all"){
card.style.display="block";
}
else if(card.classList.contains(type)){
card.style.display="block";
}
else{
card.style.display="none";
}

});

}

function openRecipe(
title,time,protein,
ingredients,steps
){

document.getElementById("popup").style.display="flex";

document.getElementById("title").innerText=title;
document.getElementById("time").innerText=time;
document.getElementById("protein").innerText=protein;
document.getElementById("ingredients").innerText=ingredients;
document.getElementById("steps").innerText=steps;

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document
.querySelectorAll(".recipe-card")
.forEach(card=>{

let text=
card.innerText.toLowerCase();

card.style.display=
text.includes(value)
? "block"
: "none";

});

});

</script>

</body>
</html>
